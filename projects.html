<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Projects | Muhammad Rafay Mahmood</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">

    <script>
        if (localStorage.getItem('color-theme') === 'dark' || (!('color-theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            document.documentElement.classList.add('dark');
        } else { document.documentElement.classList.remove('dark'); }
        tailwind.config = { darkMode: 'class', theme: { extend: { colors: { indigo: { 350: '#A5B4FC', 400: '#818CF8', 600: '#4F46E5' } } } } }
    </script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap');
        html { scroll-behavior: smooth; }
        body { font-family: 'Inter', sans-serif; transition: background-color 0.3s ease, color 0.3s ease; } 
        .bg-custom-light { background-color: #fdfcf8; }
        .dark .bg-custom-light { background-color: #0f172a; }        
        .bento-card { background: white; border-radius: 12px; border: 1px solid #e5e7eb; padding: 1.5rem; transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); cursor: pointer; }
        .dark .bento-card { background: #1e293b; border-color: #334155; }
        .bento-card:hover { transform: translateY(-5px); box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04); border-color: #818CF8; }
    </style>
</head>

<body class="bg-custom-light text-slate-800 dark:text-slate-200 min-h-screen flex flex-col relative">

    <button id="theme-btn" class="fixed top-6 right-6 md:top-8 md:right-8 z-[100] p-2.5 rounded-xl bg-white/80 dark:bg-slate-900/80 backdrop-blur-md border border-slate-200 dark:border-slate-800 shadow-sm hover:scale-105 transition-all focus:outline-none">
        <i class="fas fa-sun text-lg text-amber-500 dark:hidden block"></i>
        <i class="fas fa-moon text-lg text-slate-400 hidden dark:block"></i>
    </button>

    <div class="max-w-4xl mx-auto px-6 pt-12 pb-4 w-full">
        <a href="index.html" class="inline-flex items-center text-sm font-medium text-slate-500 dark:text-slate-400 hover:text-indigo-600 transition-all group">
            <i class="fas fa-arrow-left mr-2 group-hover:-translate-x-1 transition-transform"></i>
            Back to Home
        </a>
    </div>

    <main class="max-w-4xl mx-auto px-6 py-10 w-full flex-grow space-y-16">
        <header class="mb-12 border-b border-slate-200 dark:border-slate-800 pb-10 text-center md:text-left">
            <h1 class="text-4xl md:text-5xl font-extrabold text-slate-900 dark:text-white tracking-tight mb-4">Projects</h1>
            <p class="text-slate-500 dark:text-slate-400 italic text-lg leading-relaxed">
                "Research Innovations & Developments."
            </p>
        </header>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-8" id="project-grid">
            
            <div class="bento-card group flex flex-col h-full" onclick="openProjectModal('bh-prediction')">
                <div class="text-4xl mb-6 group-hover:scale-110 transition-transform duration-300 w-14 h-14 flex items-center justify-center bg-indigo-50 dark:bg-slate-800 rounded-xl text-indigo-500">🧠</div>
                <h3 class="font-bold text-lg mb-3 dark:text-white leading-tight">AI Focus Prediction for Boiling Histotripsy</h3>
                <p class="text-[10px] text-slate-500 uppercase font-bold tracking-widest mb-4">Deep Learning • 2024 - Present</p>
                <p class="text-sm text-indigo-600 dark:text-indigo-400 font-semibold mt-auto">Lead Researcher</p>
            </div>

            <div class="bento-card group flex flex-col h-full" onclick="openProjectModal('cavitation-imaging')">
                <div class="text-4xl mb-6 group-hover:scale-110 transition-transform duration-300 w-14 h-14 flex items-center justify-center bg-indigo-50 dark:bg-slate-800 rounded-xl text-indigo-500">🌊</div>
                <h3 class="font-bold text-lg mb-3 dark:text-white leading-tight">Passive Cavitation Imaging Localization</h3>
                <p class="text-[10px] text-slate-500 uppercase font-bold tracking-widest mb-4">Ultrasound • 2025</p>
                <p class="text-sm text-indigo-600 dark:text-indigo-400 font-semibold mt-auto">Researcher</p>
            </div>

        </div>

        <footer class="mt-24 pt-10 border-t border-slate-200 dark:border-slate-800 text-center">
            <a href="index.html" class="text-indigo-600 font-bold hover:underline transition-all hover:gap-4 flex items-center justify-center gap-2">
                <i class="fas fa-home"></i> Back to Home
            </a>
        </footer>
    </main>

    <a href="#" class="fixed bottom-8 right-8 z-50 flex flex-col items-center gap-1 text-slate-400 hover:text-indigo-600 transition-all duration-300 group">
        <span class="text-2xl group-hover:-translate-y-1 transition-transform">↑</span>
        <span class="text-[10px] font-bold tracking-widest uppercase">TOP</span>
    </a>

    <div id="project-modal" class="fixed inset-0 z-[100] hidden items-center justify-center p-4 sm:p-6 opacity-0 transition-opacity duration-300">
        <div class="absolute inset-0 bg-slate-900/60 backdrop-blur-sm" onclick="closeProjectModal()"></div>
        <div class="relative bg-white dark:bg-slate-900 max-w-2xl w-full rounded-3xl p-8 sm:p-10 shadow-2xl overflow-y-auto max-h-[90vh] transform scale-95 transition-transform duration-300 border border-slate-200 dark:border-slate-800" id="modal-inner">
            <button onclick="closeProjectModal()" class="absolute top-6 right-6 w-8 h-8 flex items-center justify-center rounded-full bg-slate-100 dark:bg-slate-800 text-slate-500 hover:text-slate-800 dark:hover:text-white transition-colors focus:outline-none">
                <i class="fas fa-times"></i>
            </button>
            <div id="modal-content">
                </div>
        </div>
    </div>

    <script>
        const themeBtn = document.getElementById('theme-btn');
        themeBtn.onclick = () => {
            document.documentElement.classList.toggle('dark');
            localStorage.setItem('color-theme', document.documentElement.classList.contains('dark') ? 'dark' : 'light');
        };

        const projectData = {
            'bh-prediction': {
                title: "Development of AI model for predicting the focus of boiling histotripsy",
                duration: "2024 – Present",
                role: "Lead Researcher",
                funding: "National Research Foundation of Korea",
                status: "Ongoing",
                desc: "This project focuses on optimizing pre-treatment algorithms for non-invasive therapeutic ultrasound. By utilizing B-mode ultrasound images, we developed a high-precision deep learning model (incorporating SA-UNet and Multi-Task U-Net architectures) capable of real-time prediction of the boiling histotripsy focus.",
                tech: ["Python", "PyTorch", "Deep Learning", "Ultrasound Imaging", "U-Net"]
            },
            'cavitation-imaging': {
                title: "Enhanced bubble localization in passive cavitation imaging",
                duration: "2025",
                role: "Researcher",
                funding: "Kyung Hee University Research Fund",
                status: "Completed",
                desc: "An investigation into acoustic cavitation dynamics. We developed algorithms to significantly enhance bubble localization accuracy during Boiling Histotripsy (BH) and Pressure-Modulated Shockwave Histotripsy (PSH), directly contributing to treatment safety and efficacy.",
                tech: ["MATLAB", "Signal Processing", "Acoustics", "Data Visualization"]
            }
        };

        const modal = document.getElementById('project-modal');
        const modalInner = document.getElementById('modal-inner');

        function openProjectModal(id) {
            const data = projectData[id];
            const techTags = data.tech.map(t => `<span class="px-3 py-1 bg-slate-100 dark:bg-slate-800 text-slate-600 dark:text-slate-300 rounded-full text-[11px] font-bold">${t}</span>`).join('');

            document.getElementById('modal-content').innerHTML = `
                <p class="text-indigo-600 dark:text-indigo-400 font-bold text-[10px] uppercase tracking-widest mb-2">Project Details</p>
                <h2 class="text-2xl sm:text-3xl font-bold mb-8 dark:text-white leading-tight pr-8">${data.title}</h2>
                
                <div class="grid grid-cols-1 sm:grid-cols-2 gap-y-6 gap-x-4 text-sm border-y border-slate-100 dark:border-slate-800 py-6 mb-8 bg-slate-50/50 dark:bg-slate-900/50 rounded-xl px-4">
                    <div><p class="text-slate-400 font-bold uppercase text-[10px] tracking-widest mb-1">Duration</p><p class="font-medium dark:text-slate-200">${data.duration}</p></div>
                    <div><p class="text-slate-400 font-bold uppercase text-[10px] tracking-widest mb-1">Status</p><p class="${data.status === 'Ongoing' ? 'text-green-500' : 'text-indigo-500'} font-bold">${data.status}</p></div>
                    <div><p class="text-slate-400 font-bold uppercase text-[10px] tracking-widest mb-1">Role</p><p class="font-medium dark:text-slate-200">${data.role}</p></div>
                    <div><p class="text-slate-400 font-bold uppercase text-[10px] tracking-widest mb-1">Funding</p><p class="font-medium dark:text-slate-200">${data.funding}</p></div>
                </div>
                
                <div class="space-y-4 mb-8">
                    <p class="text-slate-800 dark:text-slate-200 font-bold text-lg">Project Description</p>
                    <p class="text-slate-600 dark:text-slate-400 leading-relaxed text-justify text-sm">${data.desc}</p>
                </div>

                <div class="space-y-4">
                    <p class="text-slate-800 dark:text-slate-200 font-bold text-lg">Technologies Used</p>
                    <div class="flex flex-wrap gap-2">
                        ${techTags}
                    </div>
                </div>
            `;
            
            modal.classList.remove('hidden');
            void modal.offsetWidth;
            modal.classList.remove('opacity-0');
            modalInner.classList.remove('scale-95');
            document.body.style.overflow = 'hidden';
        }

        function closeProjectModal() {
            modal.classList.add('opacity-0');
            modalInner.classList.add('scale-95');
            setTimeout(() => {
                modal.classList.add('hidden');
                document.body.style.overflow = 'auto';
            }, 300);
        }
    </script>
</body>
</html>
