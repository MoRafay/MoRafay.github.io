<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact | Muhammad Rafay Mahmood</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <script>
        // 메인 페이지와 동일한 다크모드 로직 적용
        if (localStorage.getItem('color-theme') === 'dark' || (!('color-theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            document.documentElement.classList.add('dark');
        } else {
            document.documentElement.classList.remove('dark');
        }
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #fdfcf8; }
        .dark body { background-color: #0f172a; }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-6">

    <main class="max-w-xl w-full bento-card bg-white dark:bg-[#1e293b] border border-slate-200 dark:border-slate-800 rounded-3xl p-10 md:p-16 shadow-sm text-center space-y-10">
        
        <header class="space-y-4">
            <h2 class="text-3xl font-extrabold text-slate-900 dark:text-white">Get in Touch</h2>
            <p class="text-slate-600 dark:text-slate-400 leading-relaxed text-sm">
                I am always open to discussing new research opportunities or potential collaborations.<br>
                Feel free to reach out via email or any of the platforms below.
            </p>
        </header>

        <div class="flex flex-col items-center gap-3">
            <div class="flex items-center gap-3 bg-slate-50 dark:bg-slate-800/50 px-4 py-2 rounded-xl border border-slate-100 dark:border-slate-700">
                <span class="text-sm font-semibold text-slate-500">Email :</span>
                <a href="mailto:mrafaym@khu.ac.kr" class="text-indigo-600 dark:text-indigo-400 font-bold hover:underline">
                    mrafaym@khu.ac.kr
                </a>
                <button onclick="copyEmail()" class="ml-2 px-2 py-1 text-[10px] font-bold uppercase tracking-tighter bg-slate-200 dark:bg-slate-700 text-slate-500 dark:text-slate-400 rounded hover:bg-slate-300 transition-colors">
                    Copy
                </button>
            </div>
            <span id="copy-msg" class="text-[10px] text-green-500 font-bold opacity-0 transition-opacity uppercase">Copied to clipboard!</span>
        </div>

        <div class="flex justify-center gap-6">
            <a href="https://www.linkedin.com/in/morafay-917a3228b" target="_blank" 
               class="w-12 h-12 border border-slate-200 dark:border-slate-700 rounded-xl flex items-center justify-center hover:bg-indigo-50 dark:hover:bg-indigo-900/30 hover:border-indigo-400 transition-all group">
                <i class="fab fa-linkedin-in text-slate-600 dark:text-slate-400 group-hover:text-indigo-600"></i>
            </a>
            <a href="https://x.com/your_handle" target="_blank" 
               class="w-12 h-12 border border-slate-200 dark:border-slate-700 rounded-xl flex items-center justify-center hover:bg-indigo-50 dark:hover:bg-indigo-900/30 hover:border-indigo-400 transition-all group">
                <i class="fab fa-x-twitter text-slate-600 dark:text-slate-400 group-hover:text-indigo-600"></i>
            </a>
            <a href="https://www.instagram.com/mo_.rafi__" target="_blank" 
               class="w-12 h-12 border border-slate-200 dark:border-slate-700 rounded-xl flex items-center justify-center hover:bg-indigo-50 dark:hover:bg-indigo-900/30 hover:border-indigo-400 transition-all group">
                <i class="fab fa-instagram text-slate-600 dark:text-slate-400 group-hover:text-indigo-600"></i>
            </a>
        </div>

        <footer class="pt-4 border-t border-slate-100 dark:border-slate-800">
            <a href="/" class="text-xs font-bold text-slate-400 hover:text-indigo-600 transition-colors uppercase tracking-widest">
                ← Back to Home
            </a>
        </footer>
    </main>

    <script>
        function copyEmail() {
            const email = "mrafaym@khu.ac.kr";
            navigator.clipboard.writeText(email).then(() => {
                const msg = document.getElementById('copy-msg');
                msg.style.opacity = '1';
                setTimeout(() => msg.style.opacity = '0', 2000);
            });
        }
    </script>
</body>
</html>
