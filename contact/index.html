<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact | Muhammad Rafay Mahmood</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
    <script>
        // 다크모드 초기화
        if (localStorage.getItem('color-theme') === 'dark' || (!('color-theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            document.documentElement.classList.add('dark');
        } else {
            document.documentElement.classList.remove('dark');
        }

        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        indigo: { 400: '#818CF8', 600: '#4F46E5' }
                    }
                }
            }
        }
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; transition: background-color 0.3s; } 
        /* 메인 페이지와 동일한 배경색 적용 */
        .bg-custom-light { background-color: #fdfcf8; }
        .dark .bg-custom-light { background-color: #0f172a; }
    </style>
</head>
<body class="bg-custom-light text-slate-800 dark:text-slate-200 min-h-screen flex items-center justify-center p-6">

    <main class="max-w-2xl w-full text-center space-y-10">
        
        <div class="space-y-4">
            <h2 class="text-3xl font-extrabold text-slate-900 dark:text-white">Get in Touch</h2>
            <p id="contact-body" class="text-slate-600 dark:text-slate-400 leading-relaxed text-base">
                I am always open to discussing new research opportunities or potential collaborations.<br>
                Feel free to reach out via email or any of the platforms below.
            </p>
        </div>

        <div class="flex flex-col items-center gap-2">
            <div class="flex items-center gap-2 text-base md:text-lg text-slate-600 dark:text-slate-400">
                <span class="font-medium">Email :</span>
                <a href="mailto:mrafaym@khu.ac.kr" class="font-bold hover:text-indigo-600 dark:hover:text-indigo-400 transition-colors">
                    mrafaym@khu.ac.kr
                </a>
                <button onclick="copyEmail()" class="ml-1 px-2 py-0.5 text-[10px] font-bold uppercase tracking-tighter bg-slate-200/50 dark:bg-slate-800 text-slate-500 rounded hover:bg-slate-200 transition-colors">
                    Copy
                </button>
            </div>
            <span id="copy-msg" class="text-[10px] text-indigo-500 font-bold opacity-0 transition-opacity uppercase">Copied to clipboard!</span>
        </div>

        <div class="flex justify-center gap-5">
            <a href="https://www.linkedin.com/in/morafay-917a3228b" target="_blank" rel="noopener noreferrer" 
               class="w-10 h-10 border border-slate-200 dark:border-slate-700 rounded-xl flex items-center justify-center hover:bg-indigo-50 dark:hover:bg-slate-800 hover:border-indigo-400 transition-all group">
                <i class="fab fa-linkedin-in text-slate-600 dark:text-slate-400 group-hover:text-indigo-600"></i>
            </a>
            <a href="https://x.com/rafayinkorea?s=21" target="_blank" rel="noopener noreferrer" 
               class="w-10 h-10 border border-slate-200 dark:border-slate-700 rounded-xl flex items-center justify-center hover:bg-indigo-50 dark:hover:bg-slate-800 hover:border-indigo-400 transition-all group">
                <i class="fab fa-x-twitter text-slate-600 dark:text-slate-400 group-hover:text-indigo-600"></i>
            </a>
            <a href="https://www.instagram.com/mo_.rafi__" target="_blank" rel="noopener noreferrer" 
               class="w-10 h-10 border border-slate-200 dark:border-slate-700 rounded-xl flex items-center justify-center hover:bg-indigo-50 dark:hover:bg-slate-800 hover:border-indigo-400 transition-all group">
                <i class="fab fa-instagram text-slate-600 dark:text-slate-400 group-hover:text-indigo-600"></i>
            </a>
        </div>

        <div class="pt-6">
            <a href="/" class="text-[10px] font-bold text-slate-400 hover:text-indigo-600 transition-colors uppercase tracking-[0.2em]">
                ← Back to Home
            </a>
        </div>
    </main>

    <script>
        function copyEmail() {
            const email = "mrafaym@khu.ac.kr";
            navigator.clipboard.writeText(email).then(() => {
                const msg = document.getElementById('copy-msg');
                msg.style.opacity = '1';
                setTimeout(() => msg.style.opacity = '0', 2000);
            });
        }
    </script>
</body>
</html>
