<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact | Muhammad Rafay Mahmood</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
    <script>
        // 다크모드 초기화
        if (localStorage.getItem('color-theme') === 'dark' || (!('color-theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            document.documentElement.classList.add('dark');
        } else {
            document.documentElement.classList.remove('dark');
        }

        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        indigo: { 400: '#818CF8', 600: '#4F46E5' }
                    }
                }
            }
        }
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; transition: background-color 0.3s; } 
        
        /* 배경색 유지 */
        .bg-custom-light { background-color: #fdfcf8; }
        .dark .bg-custom-light { background-color: #0f172a; }

        /* 페이드인 애니메이션 */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(15px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-fade-in {
            animation: fadeIn 0.8s ease-out forwards;
        }
    </style>
</head>
<body class="bg-custom-light text-slate-800 dark:text-slate-200 min-h-screen flex items-center justify-center p-6">

    <main class="max-w-2xl w-full text-center space-y-12 animate-fade-in">
        
        <div class="space-y-4">
            <h1 class="text-3xl md:text-4xl font-semibold text-slate-900 dark:text-white tracking-tight">
                Get in Touch
            </h1>
            <p id="contact-body" class="text-slate-500 dark:text-slate-400 font-light leading-relaxed text-base md:text-lg">
                I’m always excited to connect with fellow researchers and explore potential collaborations. <br class="hidden md:block">
                If you'd like to talk about research or just say hi, feel free to reach out!
            </p>
        </div>

        <div class="flex flex-col items-center gap-4">
            <div class="flex flex-col md:flex-row items-center gap-2 md:gap-4">
                <span class="text-sm font-medium uppercase tracking-widest opacity-60">Email :</span>
                <div class="flex items-center gap-3">
                    <a href="mailto:mrafaym@khu.ac.kr" class="text-xl md:text-2xl font-medium text-indigo-600 dark:text-indigo-400 hover:opacity-80 transition-opacity">
                        mrafaym@khu.ac.kr
                    </a>
                    <button onclick="copyEmail()" class="px-3 py-1 text-[10px] font-bold uppercase tracking-tighter bg-slate-100 dark:bg-slate-800 text-slate-500 rounded hover:bg-slate-200 dark:hover:bg-slate-700 transition-colors">
                        Copy
                    </button>
                </div>
            </div>
            <span id="copy-msg" class="text-[10px] text-indigo-500 font-bold opacity-0 transition-opacity uppercase tracking-widest">
                Copied to clipboard!
            </span>
        </div>

        <div class="flex justify-center gap-6 pt-4">
            <a href="https://www.linkedin.com/in/morafay-917a3228b" target="_blank" rel="noopener noreferrer" 
               class="w-12 h-12 border border-slate-200 dark:border-slate-800 rounded-xl flex items-center justify-center text-slate-500 hover:text-indigo-600 hover:border-indigo-400 transition-all group">
                <i class="fab fa-linkedin-in text-lg"></i>
            </a>
            <a href="https://x.com/rafayinkorea?s=21" target="_blank" rel="noopener noreferrer" 
               class="w-12 h-12 border border-slate-200 dark:border-slate-800 rounded-xl flex items-center justify-center text-slate-500 hover:text-indigo-600 hover:border-indigo-400 transition-all group">
                <i class="fab fa-x-twitter text-lg"></i>
            </a>
            <a href="https://www.instagram.com/mo_.rafi__" target="_blank" rel="noopener noreferrer" 
               class="w-12 h-12 border border-slate-200 dark:border-slate-800 rounded-xl flex items-center justify-center text-slate-500 hover:text-indigo-600 hover:border-indigo-400 transition-all group">
                <i class="fab fa-instagram text-lg"></i>
            </a>
        </div>

        <div class="pt-8">
            <a href="/" class="text-[10px] font-bold text-slate-400 hover:text-indigo-600 transition-colors uppercase tracking-[0.2em]">
                ← Back to Home
            </a>
        </div>
    </main>

    <script>
        function copyEmail() {
            const email = "mrafaym@khu.ac.kr";
            navigator.clipboard.writeText(email).then(() => {
                const msg = document.getElementById('copy-msg');
                msg.style.opacity = '1';
                setTimeout(() => msg.style.opacity = '0', 2000);
            });
        }
    </script>
</body>
</html>
